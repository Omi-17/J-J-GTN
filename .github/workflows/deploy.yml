name: Deploy to GitHub Pages

# Runs on every push to the main branch, and can be triggered manually.
on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Permissions the deploy needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one deployment at a time; don't cancel an in-progress one.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      # This is a static site (plain HTML/CSS/JS + JSON data) — no build step.
      # We simply upload the whole repository as the site.
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
